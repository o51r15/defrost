<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>deFrost{% block title %}{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>
<body class="bg-dark text-light">

  <!-- Navbar -->
  <nav class="navbar navbar-dark bg-black border-bottom border-secondary px-4 py-2">
    <div class="d-flex align-items-center gap-3">
      <span class="navbar-brand fw-bold text-white mb-0">
        ❄️ deFrost
      </span>
      <span class="badge bg-secondary text-white" style="font-size:0.7rem">v0.1.0</span>
    </div>
    <div class="d-flex gap-3">
      <a href="/" class="nav-link text-secondary {% if request.path == '/' %}text-white{% endif %}">
        Dashboard
      </a>
      <a href="/setup" class="nav-link text-secondary {% if request.path == '/setup' %}text-white{% endif %}">
        Setup
      </a>
    </div>
  </nav>

  <!-- Main content -->
  <main class="container-fluid px-4 py-4" style="max-width: 860px;">
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
